<!DOCTYPE html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />

    <!-- Icône de l'app dans l'onglet du navigateur -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Configuration responsive pour mobile/tablette -->
    <!-- viewport-fit=cover : pour exploiter tout l'écran sur iPhone/iPad -->
    <!-- user-scalable=no : empêche le zoom par pincement (évite les erreurs de clic) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- Couleur de la barre de statut (mobile) - rouge identique au prototype -->
    <meta name="theme-color" content="#0f172a" />

    <!-- ============================================
         CONFIGURATION PWA POUR iPad / iPhone (Safari)
         Permet l'installation comme une vraie app iOS
         ============================================ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D-IA-NE Bingo" />

    <!-- ============================================
         CONFIGURATION PWA POUR Android (Chrome)
         ============================================ -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="D-IA-NE Bingo Tracker" />

    <!-- Description (utile pour les moteurs de recherche et le partage de liens) -->
    <meta name="description" content="Application de suivi de bingo en temps réel - Fabriqué et opéré par Diane Brochu" />

    <!-- ============================================
         FONTAWESOME - Bibliothèque d'icônes
         (identique au prototype HTML)
         ============================================ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Titre de l'app affiché dans l'onglet du navigateur -->
    <title>D-IA/NE BINGO Tracker v1.1</title>
  </head>
  <body>
    <!-- Point d'ancrage où React va injecter toute l'application -->
    <div id="root"></div>

    <!-- Chargement du code TypeScript/React (point d'entrée) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
